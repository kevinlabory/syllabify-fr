name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["--features regex-full", "--no-default-features --features regex-lite"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (${{ matrix.features }})
        run: cargo test ${{ matrix.features }} --lib --tests

  regression:
    name: Oracle 4830 words
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test regression

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  msrv:
    name: MSRV 1.85
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: rm -f Cargo.lock
      - run: cargo build --lib

  deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all
          # `check all` runs : advisories, licenses, bans, sources

  semver:
    name: SemVer (public API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Compare la surface publique de la crate `syllabify-fr` à la dernière
      # version publiée sur crates.io et échoue si un changement cassant
      # n'est pas accompagné d'un bump de version adéquat. cargo-semver-checks
      # est conscient du pré-1.0 : 0.x.y → 0.(x+1).0 autorise les ruptures,
      # 0.x.y → 0.x.(y+1) ne les autorise pas.
      #
      # Scope = `package: syllabify-fr` uniquement : les 4 bindings ne sont
      # PAS publiés sur crates.io (npm/PyPI/Maven), donc aucune baseline n'y
      # existe. Leur parité reste couverte par la checklist manuelle de
      # CLAUDE.md (« Bindings parity »).
      - name: Check public API semver vs crates.io baseline
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: syllabify-fr

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    # Non bloquant : on observe la baseline d'abord, on durcira plus tard.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Generate lcov report
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  fuzz-smoke:
    name: Fuzz smoke (60s × cible)
    # Uniquement sur push main : ne ralentit pas les PRs, donne un signal sur main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        # No `--locked`: cargo-fuzz 0.13.1 pins rustix 0.36.5 which fails to
        # compile on current nightly (`cfg(rustc_attrs)` gate is broken).
        # Letting cargo resolve deps in semver-compatible mode picks a
        # working rustix. cargo-fuzz is a CI tool, not project code, so
        # reproducibility matters less here.
        run: cargo install cargo-fuzz
      - name: Smoke fuzz each target (60s)
        working-directory: fuzz
        run: |
          for target in syllables syllabify_text phonemes render_html; do
            echo "::group::fuzz $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=60
            echo "::endgroup::"
          done

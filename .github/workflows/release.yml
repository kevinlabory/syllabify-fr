name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub Release
  id-token: write   # npm OIDC Trusted Publishing

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Tests
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Format
        run: cargo fmt --all -- --check

  github-release:
    name: GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md || true
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md

  publish-crates-io:
    name: Publish crates.io
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish syllabify-fr
        run: cargo publish -p syllabify-fr --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish @dyscolor/syllabify-fr-wasm
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build wasm/ --target bundler --scope dyscolor --release
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No registry-url: prevents setup-node from injecting NODE_AUTH_TOKEN,
          # which would shadow the OIDC credentials.
      - name: Upgrade npm
        run: npm install -g npm@latest  # >= 11.5.1 required for OIDC auth
      - name: Publish to npm
        working-directory: wasm/pkg
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""  # clear in case setup-node injected one

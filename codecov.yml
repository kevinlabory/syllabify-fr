# Codecov configuration
# https://docs.codecov.com/docs/codecov-yaml
#
# Le glue cross-language (FFI/JNI/PyO3/WASM) est exclu : ces fichiers sont
# testés dans leur écosystème natif (C, Java, Python, JS), pas par cargo test.
# Les compter dans la coverage Rust serait une erreur métrique.

coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 1%
    patch:
      default:
        target: 80%

ignore:
  - "ffi/**"
  - "jni/**"
  - "py/**"
  - "wasm/src/lib.rs"
  - "fuzz/**"
  - "benches/**"

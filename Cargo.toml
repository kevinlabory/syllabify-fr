[package]
name = "syllabify-fr"
version = "0.1.0"
edition = "2021"
description = "Syllabification française pour l'apprentissage de la lecture — port de LireCouleur"
license = "GPL-3.0-or-later"
readme = "README.md"
repository = "https://github.com/dyscolor/syllabify-fr"
keywords = ["french", "syllables", "phonology", "dyslexia", "reading"]
categories = ["text-processing", "science"]

[lib]
name = "syllabify_fr"
path = "src/lib.rs"

[[bin]]
name = "syllabify"
path = "src/bin/cli.rs"

[dependencies]
regex = "1"

[dev-dependencies]
serde_json = "1"

[profile.release]
lto = true
codegen-units = 1
